<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trocar Senha — Petit</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <a class="logo" href="/index.html">Petit</a>
      <ul id="nav-links"></ul>
    </nav>
  </header>

  <main class="container-auth">
    <div class="auth-card">
      <h1>Trocar Senha</h1>
      <p id="msg" class="msg" style="display:none"></p>

      <form id="form-change">
        <div class="form-group">
          <label for="old-password">Senha atual</label>
          <input type="password" id="old-password" required>
        </div>
        <div class="form-group">
          <label for="new-password">Nova senha</label>
          <input type="password" id="new-password" required>
          <small>Mínimo 8 caracteres. Não use apenas números.</small>
        </div>
        <button type="submit" class="btn-primary btn-full">Trocar senha</button>
      </form>

      <div class="auth-links">
        <a href="/dashboard.html">Cancelar</a>
      </div>
    </div>
  </main>

  <footer>
    <p>Petit — Programação para a Web em Python · PUC-Rio 2026/1</p>
  </footer>

  <script src="/javascript/constantes.js"></script>
  <script src="/javascript/accounts/common.js"></script>
  <script src="/javascript/cabecalho.js"></script>
  <script src="/javascript/accounts/passwordChange.js"></script>
</body>
</html>
