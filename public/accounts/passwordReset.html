<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esqueci minha Senha — Petit</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <a class="logo" href="/index.html">Petit</a>
    </nav>
  </header>

  <main class="container-auth">
    <div class="auth-card">
      <h1>Esqueci minha Senha</h1>
      <p>Informe seu e-mail e enviaremos um código de redefinição.</p>
      <p id="msg" class="msg" style="display:none"></p>

      <form id="form-reset">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" autocomplete="email" required>
        </div>
        <button type="submit" class="btn-primary btn-full">Enviar código</button>
      </form>

      <div class="auth-links">
        <a href="/accounts/login.html">Voltar ao login</a>
      </div>
    </div>
  </main>

  <footer>
    <p>Petit — Programação para a Web em Python · PUC-Rio 2026/1</p>
  </footer>

  <script src="/javascript/constantes.js"></script>
  <script src="/javascript/accounts/common.js"></script>
  <script src="/javascript/accounts/passwordReset.js"></script>
</body>
</html>
