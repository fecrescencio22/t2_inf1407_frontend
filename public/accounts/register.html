<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar — Petit</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <a class="logo" href="/index.html">Petit</a>
    </nav>
  </header>

  <main class="container-auth">
    <div class="auth-card">
      <h1>Criar conta</h1>
      <p id="msg" class="msg" style="display:none"></p>

      <form id="form-registro">
        <div class="form-group">
          <label for="username">Usuário</label>
          <input type="text" id="username" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" autocomplete="new-password" required>
          <small>Mínimo 8 caracteres. Não use apenas números.</small>
        </div>
        <button type="submit" class="btn-primary btn-full">Criar conta</button>
      </form>

      <div class="auth-links">
        <a href="/accounts/login.html">Já tenho conta</a>
      </div>
    </div>
  </main>

  <footer>
    <p>Petit — Programação para a Web em Python · PUC-Rio 2026/1</p>
  </footer>

  <script src="/javascript/constantes.js"></script>
  <script src="/javascript/accounts/common.js"></script>
  <script src="/javascript/accounts/register.js"></script>
</body>
</html>
