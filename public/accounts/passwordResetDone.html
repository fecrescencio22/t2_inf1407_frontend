<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir Senha — Petit</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <a class="logo" href="/index.html">Petit</a>
    </nav>
  </header>

  <main class="container-auth">
    <div class="auth-card">
      <h1>Redefinir Senha</h1>
      <p>Insira o código recebido por e-mail e escolha uma nova senha.</p>
      <p id="msg" class="msg" style="display:none"></p>

      <form id="form-reset-done">
        <div class="form-group">
          <label for="code">Código recebido</label>
          <input type="text" id="code" placeholder="Cole o código aqui" required>
        </div>
        <div class="form-group">
          <label for="new-password">Nova senha</label>
          <input type="password" id="new-password" required>
          <small>Mínimo 8 caracteres. Não use apenas números.</small>
        </div>
        <button type="submit" class="btn-primary btn-full">Redefinir senha</button>
      </form>

      <div class="auth-links">
        <a href="/accounts/login.html">Voltar ao login</a>
      </div>
    </div>
  </main>

  <footer>
    <p>Petit — Programação para a Web em Python · PUC-Rio 2026/1</p>
  </footer>

  <script src="/javascript/constantes.js"></script>
  <script src="/javascript/accounts/common.js"></script>
  <script src="/javascript/accounts/passwordResetDone.js"></script>
</body>
</html>
