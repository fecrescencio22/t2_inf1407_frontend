<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Link — Petit</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <a class="logo" href="/index.html">Petit</a>
      <ul id="nav-links"></ul>
    </nav>
  </header>

  <main class="container">
    <h1>Editar Link</h1>
    <p id="msg" class="msg" style="display:none"></p>

    <form id="form-edit" class="form-card">
      <div class="form-group">
        <label for="short-code">Código curto</label>
        <input type="text" id="short-code" disabled>
        <small>O código curto não pode ser alterado após a criação.</small>
      </div>
      <div class="form-group">
        <label for="original-url">Nova URL de destino</label>
        <input type="url" id="original-url" placeholder="https://nova-url.com" required>
      </div>
      <button type="submit" class="btn-primary">Salvar</button>
      <a href="/dashboard.html" class="btn-link">Cancelar</a>
    </form>
  </main>

  <footer>
    <p>Petit — Programação para a Web em Python · PUC-Rio 2026/1</p>
  </footer>

  <script src="/javascript/constantes.js"></script>
  <script src="/javascript/accounts/common.js"></script>
  <script src="/javascript/cabecalho.js"></script>
  <script src="/javascript/urlEdit.js"></script>
</body>
</html>
